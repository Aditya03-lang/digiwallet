# ─── Production profile — TiDB Cloud (MySQL-compatible) ───
# All values come from Railway environment variables.
# Set these in Railway dashboard → Variables:
#
#   TIDB_URL      = jdbc:mysql://<host>:<port>/<db>?sslMode=VERIFY_IDENTITY&enabledTLSProtocols=TLSv1.2,TLSv1.3
#   TIDB_USER     = <your-tidb-username>
#   TIDB_PASSWORD = <your-tidb-password>
#   TIDB_DRIVER   = com.mysql.cj.jdbc.Driver
#   JPA_DIALECT   = org.hibernate.dialect.MySQLDialect
#   DDL_AUTO      = update
#   H2_CONSOLE_ENABLED = false
#   CORS_ALLOWED_ORIGINS = https://your-vercel-app.vercel.app

spring.h2.console.enabled=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
