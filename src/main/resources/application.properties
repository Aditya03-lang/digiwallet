spring.application.name=digiwallet
server.port=${PORT:8081}

# ─── H2 (local dev fallback — only active when TIDB_URL is not set) ───
spring.datasource.url=${TIDB_URL:jdbc:h2:mem:digiwalletdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${TIDB_USER:sa}
spring.datasource.password=${TIDB_PASSWORD:password}
spring.datasource.driver-class-name=${TIDB_DRIVER:org.h2.Driver}

# H2 Console (disabled in prod via env)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# ─── JPA / Hibernate ───
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# TiDB is MySQL-compatible — dialect is auto-detected via driver, but set explicitly for safety
spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.H2Dialect}

# ─── Connection pool (HikariCP) ───
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ─── CORS (set allowed origin via env in production) ───
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}
